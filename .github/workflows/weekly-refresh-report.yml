name: Weekly Refresh and Email Report

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate report
        run: node scripts/generate-consultant-review.js

      - name: Create timestamped snapshot
        run: node scripts/create-weekly-snapshot.js

      - name: Commit refreshed outputs
        id: commit_changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add consultant-review
          if git diff --cached --quiet; then
            echo "changes_committed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "Weekly consultant profile refresh"
            git push
            echo "changes_committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send weekly email via Microsoft Graph
        run: node scripts/send-graph-weekly-report.js
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_SENDER_USER: ${{ secrets.GRAPH_SENDER_USER }}
          GRAPH_TO: "chris.gowland@nuffieldhealth.com"
          REPORT_URL: ${{ vars.REPORT_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
